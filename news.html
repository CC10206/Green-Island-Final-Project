/* ── RENDER LIST ── */
const badgeMap = { new: 'badge-new', event: 'badge-event', intl: 'badge-intl', env: 'badge-env' };

const listEl = document.getElementById('news-list');
newsData.forEach((item, idx) => {
  const el = document.createElement('div');
  el.className = 'news-item' + (idx === 0 ? ' active' : '');
  el.dataset.id = item.id;
  el.innerHTML = `
    <div class="news-item-date">
      <span class="dot"></span>
      <span>${item.date}</span>
      <span class="news-badge ${badgeMap[item.badge]}">${item.badgeLabel}</span>
    </div>
    <div class="news-item-title">${item.title}</div>
  `;
  el.addEventListener('click', () => selectNews(item.id));
  listEl.appendChild(el);
});

/* ── RENDER DETAIL ── */
function selectNews(id) {
  const item = newsData.find(n => n.id === id);
  if (!item) return;

  document.querySelectorAll('.news-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <div class="detail-animate">
      <div class="detail-image-wrap">
        <div class="detail-img-placeholder" style="background:${item.imgGradient};">
          <div class="img-icon">${item.imgIcon}</div>
          <div class="img-caption">${item.imgCaption}</div>
        </div>
      </div>
      <div class="detail-body">
        <div class="detail-meta">
          <div class="detail-date">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="2" stroke="#6b7f6c" stroke-width="1.3"/><path d="M5 2v2M11 2v2M2 7h12" stroke="#6b7f6c" stroke-width="1.3" stroke-linecap="round"/></svg>
            ${item.date}
          </div>
          <span class="news-badge ${badgeMap[item.badge]}">${item.badgeLabel}</span>
        </div>
        <h1 class="detail-title">${item.title}</h1>
        <div class="detail-divider"></div>
        <div class="detail-content">${item.content}</div>
        <div class="detail-tags">
          ${item.tags.map(t => `<span class="detail-tag"># ${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `;

  if (window.innerWidth < 768) {
    document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

/* Init with first item */
selectNews(1);

/* ── MOBILE MENU ── */
function toggleMenu() {
  document.getElementById('mobile-menu').classList.toggle('show');
}
