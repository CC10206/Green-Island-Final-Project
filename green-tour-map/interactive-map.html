<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isle of Roam — Interactive Map · 綠島</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" />

<style>

:root {
  --vic-forest:      #195724;
  --vic-forest-dark: #0d3d18;
  --vic-forest-mid:  #2d7a3a;
  --vic-grass:       #C2D099;
  --vic-grass-light: #e2edc8;
  --vic-sand:        #f5f0e8;
  --vic-sand-dark:   #e8e0d0;
  --vic-deep:        #0d2e15;
  --vic-moss:        #4a7c59;
  --vic-ocean:       #1a6b8a;
  --vic-ocean-light: #d0eaf5;
  --vic-ocean-mid:   #3a9bbf;
  --vic-coral:       #e07b54;
  --vic-coral-light: #fde8de;
  --vic-amber:       #c8862a;
  --vic-amber-light: #fdf0d8;
  --vic-ink:         #1e2d1f;
  --vic-muted:       #5a6b52;
  --vic-white:       #ffffff;

  --vic-cat-attraction: var(--vic-ocean);
  --vic-cat-eco:        var(--vic-forest);
  --vic-cat-lodging:    var(--vic-amber);

  --vic-radius-sm:   8px;
  --vic-radius-md:   14px;
  --vic-radius-lg:   20px;
  --vic-radius-pill: 999px;
  --vic-shadow-card: 0 4px 24px rgba(13,46,21,0.12);
  --vic-shadow-float:0 12px 40px rgba(13,46,21,0.18);
  --vic-transition:  0.28s cubic-bezier(.22,.68,0,.99);
}

*, *::before, *::after { box-sizing: border-box; }

/* ── FIX 1: Lock page to viewport ── */
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--vic-deep);
  color: var(--vic-ink);
}

/* ── FIX 2: Page fills height exactly ── */
.vic-map-page {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--vic-deep);
}

/* ── Header ── */
.vic-map-header {
  background: linear-gradient(135deg, var(--vic-deep) 0%, var(--vic-forest-dark) 100%);
  border-bottom: 1px solid rgba(194,208,153,0.15);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  z-index: 1000;
  position: relative;
}
.vic-map-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  text-decoration: none;
}
.vic-map-logo-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--vic-forest-mid), var(--vic-grass));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: var(--vic-white);
  flex-shrink: 0;
}
.vic-map-logo-text { line-height: 1.2; }
.vic-map-logo-en {
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--vic-sand);
  letter-spacing: 0.04em;
}
.vic-map-logo-zh {
  font-size: 0.68rem;
  color: var(--vic-grass);
  letter-spacing: 0.22em;
}
.vic-map-header-tag {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--vic-grass);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  opacity: 0.8;
}

/* ── Layout wrapper ── */
.vic-map-wrapper {
  display: flex;
  flex: 1;
  min-height: 0;
  margin-top: 64px;            /* 新增這行：將網頁內容往下推，避開固定標頭 */
  height: calc(100vh - 64px);  /* 修改這行：扣掉新標頭精準的 64px 高度 */
}

/* ── FIX 3: Sidebar — clips content, lets children control scroll ── */
.vic-sidebar {
  width: 300px;
  flex-shrink: 0;
  height: 100%;
  background: var(--vic-sand);
  border-right: 1px solid var(--vic-sand-dark);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 900;
}

/* ── FIX 4: Filter section — pinned, never scrolls ── */
.vic-sidebar-top {
  flex-shrink: 0;
  padding: 1.4rem 1.25rem 1rem;
  border-bottom: 1px solid var(--vic-sand-dark);
}

/* ── FIX 5: Spot list section — scrolls independently ── */
.vic-sidebar-bottom {
  flex: 1;
  min-height: 0;
  overflow-y: scroll;
  padding: 1.2rem 1.25rem 1.5rem;
}
.vic-sidebar-bottom::-webkit-scrollbar { width: 4px; }
.vic-sidebar-bottom::-webkit-scrollbar-track { background: transparent; }
.vic-sidebar-bottom::-webkit-scrollbar-thumb { background: var(--vic-grass); border-radius: 4px; }

.vic-sidebar-label {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--vic-muted);
  margin-bottom: 0.9rem;
}

/* ── Filter toggle buttons ── */
.vic-filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  padding: 0.45em 1em;
  border-radius: var(--vic-radius-pill);
  border: 1.5px solid;
  cursor: pointer;
  transition: var(--vic-transition);
  background: transparent;
  letter-spacing: 0.04em;
  width: 100%;
  margin-bottom: 0.5rem;
  justify-content: flex-start;
}
.vic-filter-btn-attraction.vic-active,
.vic-filter-btn-attraction:hover {
  background: #1a6b8a;
  color: white;
}
.vic-filter-btn-eco.vic-active,
.vic-filter-btn-eco:hover {
  background: #4a7c59;
  color: white;
}
.vic-filter-btn-lodging.vic-active,
.vic-filter-btn-lodging:hover {
  background: #e8d44d;
  color: #1e2d1f;
}

/* ── Spot list cards ── */
.vic-spot-card {
  background: var(--vic-white);
  border: 1px solid var(--vic-sand-dark);
  border-radius: var(--vic-radius-md);
  padding: 0.9rem 1rem;
  margin-bottom: 0.6rem;
  cursor: pointer;
  transition: var(--vic-transition);
  position: relative;
  overflow: hidden;
}
.vic-spot-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
  transition: var(--vic-transition);
}
.vic-spot-card[data-cat="attraction"]::before { background: var(--vic-ocean); }
.vic-spot-card[data-cat="eco"]::before        { background: var(--vic-forest); }
.vic-spot-card[data-cat="lodging"]::before    { background: var(--vic-amber); }
.vic-spot-card:hover {
  transform: translateX(3px);
  box-shadow: var(--vic-shadow-card);
  border-color: rgba(25,87,36,0.2);
}
.vic-spot-card-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--vic-ink);
  margin-bottom: 0.2rem;
}
.vic-spot-card-meta {
  font-size: 0.7rem;
  color: var(--vic-muted);
}
.vic-spot-card-badge {
  display: inline-block;
  font-size: 0.6rem;
  padding: 0.15em 0.6em;
  border-radius: var(--vic-radius-pill);
  font-weight: 500;
  margin-top: 0.3rem;
  letter-spacing: 0.05em;
}
.vic-spot-card[data-cat="attraction"] .vic-spot-card-badge { background: var(--vic-ocean-light); color: var(--vic-ocean); }
.vic-spot-card[data-cat="eco"] .vic-spot-card-badge        { background: var(--vic-grass-light); color: var(--vic-forest); }
.vic-spot-card[data-cat="lodging"] .vic-spot-card-badge    { background: var(--vic-amber-light); color: var(--vic-amber); }

/* ── Map container ── */
.vic-map-container {
  flex: 1;
  position: relative;
  min-width: 0;
}
#vic-leaflet-map {
  width: 100%;
  height: 100%;
  background: #a8d8e8;
}

/* ── Leaflet popup overrides ── */
.vic-popup .leaflet-popup-content-wrapper {
  background: var(--vic-white);
  border: none;
  border-radius: var(--vic-radius-lg);
  box-shadow: var(--vic-shadow-float);
  padding: 0;
  overflow: hidden;
  min-width: 220px;
}
.vic-popup .leaflet-popup-tip-container { display: none; }
.vic-popup .leaflet-popup-content { margin: 0; }

.vic-popup-inner { padding: 1.2rem 1.3rem 1.1rem; }
.vic-popup-cat {
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.2em 0.7em;
  border-radius: var(--vic-radius-pill);
  display: inline-block;
  margin-bottom: 0.65rem;
}
.vic-popup-cat-attraction { background: var(--vic-ocean-light); color: var(--vic-ocean); }
.vic-popup-cat-eco        { background: var(--vic-grass-light); color: var(--vic-forest); }
.vic-popup-cat-lodging    { background: var(--vic-amber-light); color: var(--vic-amber); }

.vic-popup-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--vic-ink);
  margin-bottom: 0.4rem;
  line-height: 1.35;
}
.vic-popup-desc {
  font-size: 0.8rem;
  color: var(--vic-muted);
  line-height: 1.7;
  margin-bottom: 0.9rem;
}
.vic-popup-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35em;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--vic-white);
  background: var(--vic-forest);
  border: none;
  border-radius: var(--vic-radius-pill);
  padding: 0.45em 1.1em;
  cursor: pointer;
  text-decoration: none;
  transition: background var(--vic-transition);
}
.vic-popup-btn:hover { background: var(--vic-deep); color: var(--vic-white); }

/* ── Custom Leaflet marker pins ── */
.vic-marker-pin {
  width: 34px;
  height: 42px;
  position: relative;
}
.vic-marker-pin svg { width: 100%; height: 100%; }

/* ── Map legend ── */
.vic-map-legend {
  position: absolute;
  bottom: 20px;
  right: 14px;
  z-index: 800;
  background: rgba(255,255,255,0.94);
  border: 1px solid var(--vic-sand-dark);
  border-radius: var(--vic-radius-md);
  padding: 0.7rem 0.9rem;
  backdrop-filter: blur(8px);
  box-shadow: var(--vic-shadow-card);
  min-width: 150px;
}
.vic-legend-title {
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--vic-muted);
  margin-bottom: 0.55rem;
}
.vic-legend-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.73rem;
  color: var(--vic-ink);
  margin-bottom: 0.35rem;
}
.vic-legend-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Mobile ── */
.vic-mobile-toggle {
  display: none;
  position: absolute;
  top: 14px;
  left: 14px;
  z-index: 850;
  background: var(--vic-white);
  border: 1px solid var(--vic-sand-dark);
  border-radius: var(--vic-radius-md);
  padding: 0.5rem 0.75rem;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--vic-forest);
  cursor: pointer;
  box-shadow: var(--vic-shadow-card);
  gap: 0.4rem;
  align-items: center;
}

.vic-spot-count {
  font-size: 0.72rem;
  color: var(--vic-muted);
  margin-bottom: 0.8rem;
}

@media (max-width: 768px) {
  .vic-map-wrapper { flex-direction: column; height: auto; }
  .vic-sidebar {
    width: 100%;
    max-height: 280px;
    border-right: none;
    border-bottom: 1px solid var(--vic-sand-dark);
    order: 2;
  }
  #vic-leaflet-map { height: calc(100vh - 66px - 280px); }
  .vic-map-container { order: 1; }
  .vic-mobile-toggle { display: flex; }
  .vic-map-legend { bottom: 10px; right: 10px; }
}

/* ── Entry animation ── */
@keyframes vic-slide-in {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}
.vic-spot-card { animation: vic-slide-in 0.35s ease both; }

/* ── 共同標頭基本樣式 (無捲動特效實色版) ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(26,58,46,0.97);
  box-shadow: 0 2px 20px rgba(0,0,0,0.15);
  backdrop-filter: blur(10px);
}
.desktop-nav {
  display: flex; gap: 1.4rem; align-items: center;
}
.nav-link {
  position: relative; color: rgba(255,255,255,0.85);
  font-weight: 400; font-size: 0.9rem; letter-spacing: 0.04em;
  transition: color 0.2s; text-decoration: none; padding: 4px 0;
}
.nav-link::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: #c2d099; transform: scaleX(0); transition: transform 0.25s;
}
.nav-link:hover { color: #fff; }
.nav-link:hover::after { transform: scaleX(1); }
.nav-link.active { color: #fff; }
.nav-link.active::after { transform: scaleX(1); }

#hamburger { display: none; }
#mobile-menu {
  display: none; position: fixed; inset: 0;
  background: rgba(26,58,46,0.97);
  z-index: 1200; flex-direction: column;
  align-items: center; justify-content: center; gap: 2rem;
}
#mobile-menu.show { display: flex; }
.mobile-nav-link {
  color: #e6eec9; font-size: 1.4rem; font-weight: 300;
  letter-spacing: 0.1em; text-decoration: none; transition: color 0.2s;
}
.mobile-nav-link:hover { color: #fff; }

@media (max-width: 768px) {
  #hamburger { display: flex !important; }
  .desktop-nav { display: none !important; }
  .vic-map-wrapper { margin-top: 64px !important; }
}
</style>
</head>

<script>

  const LOCATIONS = [

    /* ── Attractions ── */
    {
      id:      "green-island-lighthouse",
      name:    "Green Island Lighthouse",
      name_zh: "綠島燈塔",

    {

      link:    "https://cc10206.github.io/Green-Island-Final-Project/green-tour-map/destination-simple%20wuyouku.html"
    },
    {
      id:      "zhongliao-fishery-harbor",
      name:    "Zhongliao Fishery Harbor",
      name_zh: "中寮漁港",
      cat:     "attraction",

    },
    {

      name:    "Dabaisha",
      name_zh: "大白沙",
      cat:     "lodging",
      lat:     22.637768399748236,
      lng:     121.49368550291383,
      desc:    "Located at the prominent southwestern tip of Green Island, Dabaisha is not only one of the island's most famous snorkeling destinations but also its largest and most beautiful sandy shoreline.",
      link:    "https://cc10206.github.io/Green-Island-Final-Project/green-tour-map/destination-simple%20dabaisha.html"
    },
    {
      id:      "shilang-diving-area",
      name:    "Shilang Diving Area",
      name_zh: "石朗潛水區",
      cat:     "lodging",
      lat:     22.65703659485427,
      lng:     121.47394088874016,
      desc:    "Shilang is Green Island's premier diving site, famous for its vibrant coral reefs and unique underwater landmarks. It offers divers the incredible opportunity to send a waterproof postcard from the world-renowned Underwater Mailbox or explore the romantic Heart of the Ocean.",
      link:    "https://cc10206.github.io/Green-Island-Final-Project/green-tour-map/destination-simple%20shilang-diving-area.html"
    },
  ];

  const CAT_CONFIG = {
    attraction: { color: "#1a6b8a", label: "Eco Echo",      icon: "bi-water"                },
    eco:        { color: "#4a7c59", label: "Heritage Soul",  icon: "bi-building-fill"        },
    lodging:    { color: "#e8d44d", label: "Iron Pulse",     icon: "bi-lightning-charge-fill"}
  };

  /* ── Active filter state ── */
  const activeFilters = new Set(["attraction", "eco", "lodging"]);

  /* ── Initialise Leaflet map ── */
  const map = L.map("vic-leaflet-map", {
    center:    [22.6675, 121.4899],
    zoom:      13,
    zoomControl: true,
    attributionControl: true
  });

  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains:  "abcd",
    maxZoom:     19
  }).addTo(map);

  /* ── Build SVG marker icon ── */
  function buildIcon(cat) {
    const c = CAT_CONFIG[cat];
    const svg = `
      <svg viewBox="0 0 34 42" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 0C8.16 0 1 7.16 1 16c0 10.5 14.08 24.36 15.22 25.48a1.1 1.1 0 0 0 1.56 0C18.92 40.36 33 26.5 33 16 33 7.16 25.84 0 17 0z"
              fill="${c.color}" stroke="white" stroke-width="1.5"/>
        <circle cx="17" cy="16" r="8" fill="white" fill-opacity="0.25"/>
        <text x="17" y="21" text-anchor="middle" font-size="11"
              font-family="bootstrap-icons" fill="white">
        </text>
      </svg>`;
    return L.divIcon({
      className: "",
      html: `<div class="vic-marker-pin">${svg}</div>`,
      iconSize:   [34, 42],
      iconAnchor: [17, 42],
      popupAnchor:[0, -44]
    });
  }

  /* ── Marker emoji fallback ── */
  const CAT_EMOJI = { attraction: "🌊", eco: "🏛️", lodging: "🫀" };

  function buildIconWithEmoji(cat) {
    const c = CAT_CONFIG[cat];
    const html = `
      <div style="
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: ${c.color};
        border: 2.5px solid rgba(255,255,255,0.85);
        box-shadow: 0 3px 10px rgba(0,0,0,0.25);
        display: flex;
        align-items: center;
        justify-content: center;
      ">
        <i class="bi ${c.icon}" style="
          font-size: 1rem;
          color: #ffffff;
          line-height: 1;
        "></i>
      </div>`;
    return L.divIcon({
      className:   "",
      html:        html,
      iconSize:    [36, 36],
      iconAnchor:  [18, 18],
      popupAnchor: [0, -22]
    });
  }

  /* ── Build popup HTML ── */
  function buildPopup(loc) {
    const c = CAT_CONFIG[loc.cat];
    return `
      <div class="vic-popup-inner">
        <span class="vic-popup-cat vic-popup-cat-${loc.cat}">${c.label}</span>
        <div class="vic-popup-title">${loc.name}${loc.name_zh ? `<br><span style="font-size:0.7em;font-weight:400;color:#5a6b52;">${loc.name_zh}</span>` : ""}</div>
        <p class="vic-popup-desc">${loc.desc}</p>
        <a href="${loc.link}" class="vic-popup-btn">
          View More <i class="bi bi-arrow-right"></i>
        </a>
      </div>`;
  }

  /* ── Marker store ── */
  const markerMap = {};
  const layerGroups = {
    attraction: L.layerGroup().addTo(map),
    eco:        L.layerGroup().addTo(map),
    lodging:    L.layerGroup().addTo(map)
  };

  /* ── Render all markers ── */
  LOCATIONS.forEach(loc => {
    const marker = L.marker([loc.lat, loc.lng], { icon: buildIconWithEmoji(loc.cat) });
    marker.bindPopup(buildPopup(loc), {
      className:   "vic-popup",
      maxWidth:    280,
      minWidth:    220,
      closeButton: true
    });
    marker.addTo(layerGroups[loc.cat]);
    markerMap[loc.id] = marker;
  });

  /* ── Render sidebar spot list ── */
  function renderSpotList() {
    const list    = document.getElementById("vic-spot-list");
    const counter = document.getElementById("vic-spot-count");
    list.innerHTML = "";

    const visible = LOCATIONS.filter(l => activeFilters.has(l.cat));
    counter.innerHTML = `Showing <strong>${visible.length}</strong> location${visible.length !== 1 ? "s" : ""}`;

    if (visible.length === 0) {
      list.innerHTML = `<div style="font-size:0.8rem;color:var(--vic-muted);text-align:center;padding:1.5rem 0;">
        No locations match the active filters.</div>`;
      return;
    }

    visible.forEach((loc, i) => {
      const c    = CAT_CONFIG[loc.cat];
      const card = document.createElement("div");
      card.className   = "vic-spot-card";
      card.dataset.cat = loc.cat;
      card.style.animationDelay = `${i * 0.04}s`;
      card.innerHTML = `
        <div class="vic-spot-card-name">${loc.name}</div>
        <div class="vic-spot-card-meta">${loc.lat.toFixed(4)}°N, ${loc.lng.toFixed(4)}°E</div>
        <span class="vic-spot-card-badge">${c.label}</span>`;

      card.addEventListener("click", () => {
        map.flyTo([loc.lat, loc.lng], 15, { duration: 1.2 });
        setTimeout(() => markerMap[loc.id].openPopup(), 1300);
      });

      list.appendChild(card);
    });
  }

  /* ── Filter button logic ── */
  document.querySelectorAll(".vic-filter-btn").forEach(btn => {
    const cat = btn.dataset.cat;
    btn.classList.add("vic-active");

    btn.addEventListener("click", () => {
      if (activeFilters.has(cat)) {
        activeFilters.delete(cat);
        btn.classList.remove("vic-active");
        map.removeLayer(layerGroups[cat]);
      } else {
        activeFilters.add(cat);
        btn.classList.add("vic-active");
        layerGroups[cat].addTo(map);
      }
      renderSpotList();
    });
  });

  /* ── Initial render ── */
  renderSpotList();

/* ── MOBILE MENU TOGGLE ── */
function toggleMenu() {
  document.getElementById('mobile-menu').classList.toggle('show');
}
</script>
