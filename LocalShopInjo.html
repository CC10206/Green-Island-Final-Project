<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ISLE of ROAM - Travel Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* 整體網頁背景設定 */
body {
    background-color: #E6EEC9;
    margin: 0;
    padding: 40px;
    font-family: sans-serif; /*整個網頁的預設字體 */
}

/* 大橫幅專屬容器 */
.hero-banner {
    border-radius: 20px; 
    background-image: 
        linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
        url('images/shop-banner.jfif'); /* 用images shop-banner照片 */
    background-size: cover; 
    background-position: center;
    padding: 100px 60px; 
    color: white; 
    
    /* 文字右推 */
    display: flex;
    flex-direction: column;
    align-items: flex-end; 
    text-align: right; 
}

/* Travel Guide 大標題的樣式 */
.hero-banner h1 {
    font-family: 'Lora', serif; /* 幫大標題套上雲端文青字體 */
    font-size: 68px; /* 字體稍微放大一點點更大氣 */
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 20px;
}

/* 下方簡介文字的樣式 */
.hero-banner p {
    font-family: 'Lora', serif; /* 內文字體 */
    font-size: 19px;
    line-height: 1.6; 
    max-width: 550px; 
    margin: 0;
}
    </style>
</head>
<body>

    <!-- 大橫幅 HTML 結構開始 -->
    <div class="hero-banner">
        <h1>Travel Guide</h1>
        <p>Discover the rhythmic pulse of Green Island. From hidden coral sanctuaries to local eco-pioneers, your journey here is a shared story of conservation and connection. Explore with intention, leave only ripples.</p>
    </div>
    <!-- 大橫幅 HTML 結構結束 -->

</body>
</html>
